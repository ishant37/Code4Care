# Docker Compose Configuration for Hospital Infection Surveillance System
# Run: docker-compose up

version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiss_backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - DATA_GENERATION_INTERVAL=60
      - ANOMALY_CHECK_INTERVAL=30
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - hiss_network

  # Frontend Development Server (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hiss_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    command: npm run dev
    networks:
      - hiss_network

networks:
  hiss_network:
    driver: bridge
